<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Магия свечей и браслетов</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    background:linear-gradient(180deg,#120018,#1f0b2e,#09000f);
    color:#f3f3f3;
    min-height:100vh;
    overflow-x:hidden;
}

.container{
    width:90%;
    max-width:700px;
    margin:auto;
    padding:40px 0;
}

header{
    text-align:center;
    margin-bottom:40px;
}

header h1{
    font-family:'Cormorant Garamond', serif;
    font-size:52px;
    color:#d9c6ff;
    margin-bottom:10px;
    text-shadow:0 0 20px rgba(255,255,255,0.3);
}

header h2{
    font-size:22px;
    font-weight:300;
    color:silver;
    margin-bottom:15px;
}

.slogan{
    font-style:italic;
    color:#d0bfff;
    font-size:18px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    padding:30px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(138,43,226,0.2);
}

.quiz-title{
    font-family:'Cormorant Garamond', serif;
    font-size:38px;
    text-align:center;
    margin-bottom:30px;
    color:#ffffff;
}

.question{
    margin-bottom:25px;
}

.question h3{
    margin-bottom:15px;
    color:#e9ddff;
    font-size:20px;
}

.option{
    display:block;
    background:rgba(255,255,255,0.08);
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.3s;
    border:1px solid transparent;
}

.option:hover{
    background:rgba(255,255,255,0.15);
    border:1px solid silver;
    transform:translateY(-2px);
}

.option input{
    margin-right:10px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#6a0dad,#b19cd9);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
    font-weight:600;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(177,156,217,0.5);
}

.result{
    margin-top:30px;
    display:none;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    text-align:center;
    animation:fadeIn 1s ease;
}

.result h2{
    font-family:'Cormorant Garamond', serif;
    font-size:36px;
    margin-bottom:15px;
    color:#fff;
}

.result p{
    line-height:1.7;
    color:#eee;
}

.telegram-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    margin-top:25px;
    background:linear-gradient(90deg,#8a2be2,#c0c0c0);
    padding:16px;
    border-radius:16px;
    color:white;
    font-weight:600;
    transition:0.3s;
}

.telegram-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(255,255,255,0.25);
}

footer{
    text-align:center;
    margin-top:40px;
    color:#c9b3ff;
    font-size:14px;
}

.glow{
    position:fixed;
    width:300px;
    height:300px;
    background:rgba(138,43,226,0.15);
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-100px;
    right:-100px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){
    header h1{
        font-size:40px;
    }

    .quiz-title{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<header>
    <h1>Ирина</h1>
    <h2>Магия свечей и браслетов</h2>
    <p class="slogan">Свеча приходит в жизнь именно тогда, когда душа готова к переменам ✨</p>
</header>

<div class="card">

    <div class="quiz-title">
        Какая свеча тебе подходит?
    </div>

    <div class="question">
        <h3>1. Что тебе сейчас нужно больше всего?</h3>

        <label class="option">
            <input type="radio" name="q1" value="love">
            Любовь и отношения
        </label>

        <label class="option">
            <input type="radio" name="q1" value="money">
            Деньги и стабильность
        </label>

        <label class="option">
            <input type="radio" name="q1" value="energy">
            Энергия и силы
        </label>
    </div>

    <div class="question">
        <h3>2. Как ты себя чувствуешь?</h3>

        <label class="option">
            <input type="radio" name="q2" value="love">
            Одиноко и тревожно
        </label>

        <label class="option">
            <input type="radio" name="q2" value="money">
            Устала от нехватки денег
        </label>

        <label class="option">
            <input type="radio" name="q2" value="energy">
            Полностью без сил
        </label>
    </div>

    <div class="question">
        <h3>3. Что ты хочешь изменить в ближайший месяц?</h3>

        <label class="option">
            <input type="radio" name="q3" value="love">
            Привлечь любовь
        </label>

        <label class="option">
            <input type="radio" name="q3" value="money">
            Увеличить доход
        </label>

        <label class="option">
            <input type="radio" name="q3" value="energy">
            Восстановить внутреннюю силу
        </label>
    </div>

    <button onclick="showResult()">
        Узнать свою свечу 🔮
    </button>

    <div class="result" id="result"></div>

</div>

<footer>
    © Ирина — Магия свечей и браслетов
</footer>

</div>

<script>
function showResult(){

    let answers = document.querySelectorAll('input[type="radio"]:checked');

    if(answers.length < 3){
        alert("Пожалуйста, ответьте на все вопросы ✨");
        return;
    }

    let counts = {
        love:0,
        money:0,
        energy:0
    };

    answers.forEach(answer=>{
        counts[answer.value]++;
    });

    let result = "";

    if(counts.love >= counts.money && counts.love >= counts.energy){

        result = `
        <h2>Свеча Любви ❤️</h2>
        <p>
        Твоей душе сейчас особенно нужны тепло, нежность и гармония.
        Эта свеча помогает раскрыть женскую энергию, привлечь любовь
        и восстановить внутренний баланс.
        </p>
        `;

    } else if(counts.money >= counts.love && counts.money >= counts.energy){

        result = `
        <h2>Денежная свеча 💰</h2>
        <p>
        Сейчас для тебя важно восстановить поток изобилия и финансовой уверенности.
        Эта свеча помогает убрать внутренние блоки и открыть дорогу новым возможностям.
        </p>
        `;

    } else {

        result = `
        <h2>Свеча Энергии 🔥</h2>
        <p>
        Твоя энергия требует восстановления и защиты.
        Эта свеча помогает убрать усталость, наполниться силами
        и вернуть ощущение лёгкости.
        </p>
        `;
    }

    result += `
    <a class="telegram-btn" href="https://t.me/irina_badaeva" target="_blank">
        Записаться к Ирине
    </a>
    `;

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = result;

    document.getElementById("result").scrollIntoView({
        behavior:"smooth"
    });
}
</script>

</body>
</html>
